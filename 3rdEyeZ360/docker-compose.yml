version: "3.9"

services:

  mongodb:
    image: mongo:7.0
    container_name: samp_mongodb
    restart: always
    command: mongod --noauth
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  minio:
    image: minio/minio:latest
    container_name: samp_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: samp_minio
      MINIO_ROOT_PASSWORD: samp_minio_pass123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: samp_keycloak
    restart: always
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_DB: dev-file
    command: start-dev
    volumes:
      - keycloak_data:/opt/keycloak/data

volumes:
  mongo_data:
  minio_data:
  keycloak_data: